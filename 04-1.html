<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fundamentos</title>
</head>
<body>
    <style> /* é responsável pela estilização da nossa página */
        input{
            padding: 7px;
            width: 45%;
            height: 30px;
            border-radius: 12px;
            border: 1px solid #7b7bdb;
        }
        button{
            border-radius: 12px;
            border: 1px solid #020000;
            color: #fff;
            background-color: #d49797;
            width: 250px;
            height: 30px;
            margin: 10px;
        }
        button:hover{
            color: red;
            cursor: pointer;
            transition: 0.3s;
            background-color: greenyellow;
        }
        img{
            width: 150px;
            cursor: pointer;
        }
        img:hover{
            width: 300px;
            transition: .3s;
        }
        #img2{
            width: 100px;
            height: 90px;
            
        }
        h2{
            color:rgb(0, 0, 0);
            
        }
    </style> 

    <!-- Principais seletores 
         tag:  input, button, div, h1, h2, h3, h4, h5, h6
         ids: #buttao1
         classes: .button1, .btn1
    -->

    <h2>casdastro instagram</h2>
    <input type="text" placeholder="nome">
    <input type="text" placeholder="e-mail">

    <button>Entrar</button>
    <button>Cadastrar</button>

    <img id="img1" src="./image-big.png" alt="">
    <img id="img2" src="./image-small.png" alt="">
    
</body>
</html>
